<form class="{{cssClass}}" autocomplete="off">

  <!-- HEADER -->
  <header class="npc2-header">
    <img class="npc2-portrait" src="{{actor.img}}" data-edit="img" title="{{actor.name}}"/>
    <div class="npc2-header-info">
      <h1 class="npc2-name">
        <input name="name" type="text" value="{{actor.name}}" placeholder="NPC Name"/>
      </h1>
      <div class="npc2-type">NPC</div>
    </div>
  </header>

  <!-- PLACEHOLDER CONTENT -->
  <div class="npc2-placeholder">
    <div class="placeholder-icon">🚧</div>
    <h2>NPC Sheet v2</h2>
    <p>This sheet is under construction.</p>
    <p>Full NPC functionality coming soon!</p>
  </div>

</form>
